<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login DentSys</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container">
      <form action="" id="formLogin">
        <div class="formularioLogin">
          <h2>Login DentSys</h2>
          <div>
            <label for="email" id="email" name="email">E-mail</label>
            <input class="mail" type="text" placeholder="Insira seu email" />
          </div>
          <div>
            <label for="senha" id="senha" name="senha">Senha</label>
            <input
              class="pass"
              type="password"
              placeholder="Insira sua senha"
            />
          </div>
          <div class="submit btnEntrar">
            <input class="btnEntrar" type="submit" value="Entrar" />
          </div>
        </div>
      </form>
    </div>
  </body>
</html>
